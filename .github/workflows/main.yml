name: CI
on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        target: [eval, js, hl, cpp, jvm, php, python, neko]
        exclude:
          # php is not available by default for macos runners, probably not worth bothering
          - os: macos-latest
            target: php
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: kLabz/setup-haxe@neko-latest
        with:
          haxe-version: "latest"

      - name: Setup hashlink
        if: matrix.target == 'hl'
        uses: HaxeFoundation/setup-hashlink@v1
        with:
          version: nightly

      - name: Check hashlink
        if: matrix.target == 'hl'
        run: hl --version

      - name: Setup haxelib
        run: |
          haxelib newrepo
          ${{ matrix.target != 'jvm' }} || haxelib install hxjava
          ${{ matrix.target != 'cpp' }} || haxelib git hxcpp https://github.com/HaxeFoundation/hxcpp.git
          ${{ matrix.target != 'cpp' }} || haxe --cwd .haxelib/hxcpp/git/tools/hxcpp compile.hxml
          ${{ matrix.target != 'cpp' }} || haxelib git hxcpp_luv_io https://github.com/Aidan63/hxcpp_luv_io
          haxelib git utest https://github.com/haxe-utest/utest.git
          haxelib dev hxcoro .
          haxelib list
          haxe -version
          neko -version

      - name: Run tests
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"

          # Run with the default dispatcher for this target
          run_default() {
            [[ "$TARGET" != "cpp" ]] && haxe --cwd tests -debug build-$TARGET.hxml
            haxe --cwd tests build-$TARGET.hxml --hxb bin/test.hxb
            [[ "$TARGET" != "cpp" ]] && haxe --cwd tests build-$TARGET.hxml --hxb-lib bin/test.hxb
          }

          # Run again with an alternative dispatcher (env var read at runtime by Main.hx)
          # For cpp: hxcpp incremental compilation skips the C++ rebuild and re-runs the
          # existing binary with the new HXCORO_DISPATCHER value inherited from the environment.
          # For other targets: a quick recompile and re-run.
          run_extra() {
            HXCORO_DISPATCHER=$1 haxe --cwd tests build-$TARGET.hxml
          }

          run_default

          case "$TARGET" in
            eval)
              run_extra trampoline
              run_extra threadpool
              ;;
            eval|hl|cpp|jvm)
              run_extra trampoline
              ;;
          esac

      - name: Run callstack tests
        run: haxe --cwd callstack-tests build-${{ matrix.target }}.hxml
