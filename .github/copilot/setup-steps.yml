steps:
  - name: Setup Neko
    uses: kLabz/setup-haxe@neko-latest
    with:
      haxe-version: "latest"

  - name: Setup Haxe (coro-ExceptionHandler-rework)
    run: |
      curl -sL "https://build.haxe.org/builds/haxe/linux64/haxe_2026-02-25_coro-ExceptionHandler-rework_295bda0.tar.gz" -o /tmp/haxe.tar.gz
      tar xzf /tmp/haxe.tar.gz -C /tmp
      HAXE_DIR=$(ls -d /tmp/haxe_*/  | head -1)
      echo "HAXE_STD_PATH=${HAXE_DIR}std" >> $GITHUB_ENV
      echo "${HAXE_DIR}" >> $GITHUB_PATH

  - name: Setup HashLink
    run: |
      curl -sL "https://github.com/HaxeFoundation/hashlink/releases/download/latest/hashlink-0ff5b47-linux-amd64.tar.gz" -o /tmp/hl.tar.gz
      tar xzf /tmp/hl.tar.gz -C /tmp
      HL_DIR=$(ls -d /tmp/hashlink-*/  | head -1)
      sudo cp ${HL_DIR}hl /usr/local/bin/
      sudo cp ${HL_DIR}libhl.so /usr/local/lib/
      sudo cp ${HL_DIR}*.hdll /usr/local/lib/
      sudo ldconfig

  - name: Setup haxelib
    run: |
      haxelib newrepo
      haxelib git utest https://github.com/haxe-utest/utest.git
      haxelib dev hxcoro .
