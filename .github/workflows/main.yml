name: CI
on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        target: [eval, js, hl, cpp, jvm, php, python, neko]
        exclude:
          # php is not available by default for macos runners, probably not worth bothering
          - os: macos-latest
            target: php
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: kLabz/setup-haxe@neko-latest
        with:
          haxe-version: "latest"

      - name: Setup Haxe (coro-ExceptionHandler-rework)
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            curl -sL "https://build.haxe.org/builds/haxe/linux64/haxe_2026-02-25_coro-ExceptionHandler-rework_eab0fab.tar.gz" -o /tmp/haxe.tar.gz
            tar xzf /tmp/haxe.tar.gz -C /tmp
          elif [ "$RUNNER_OS" == "macOS" ]; then
            curl -sL "https://build.haxe.org/builds/haxe/mac/haxe_2026-02-25_coro-ExceptionHandler-rework_eab0fab.tar.gz" -o /tmp/haxe.tar.gz
            tar xzf /tmp/haxe.tar.gz -C /tmp
          fi
          HAXE_DIR=$(ls -d /tmp/haxe_*/ | head -1)
          echo "HAXE_STD_PATH=${HAXE_DIR}std" >> $GITHUB_ENV
          echo "${HAXE_DIR}" >> $GITHUB_PATH

      - name: Setup Haxe (coro-ExceptionHandler-rework, Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest "https://build.haxe.org/builds/haxe/windows64/haxe_2026-02-25_coro-ExceptionHandler-rework_eab0fab.zip" -OutFile "$env:TEMP\haxe.zip"
          Expand-Archive "$env:TEMP\haxe.zip" -DestinationPath "$env:TEMP"
          $haxeDir = Get-ChildItem "$env:TEMP\haxe_*" -Directory | Select-Object -First 1 -ExpandProperty FullName
          echo "HAXE_STD_PATH=$haxeDir\std" >> $env:GITHUB_ENV
          echo "$haxeDir" >> $env:GITHUB_PATH

      - name: Setup hashlink
        if: matrix.target == 'hl'
        uses: HaxeFoundation/setup-hashlink@v1
        with:
          version: nightly

      - name: Check hashlink
        if: matrix.target == 'hl'
        run: hl --version

      - name: Setup haxelib
        run: |
          haxelib newrepo
          ${{ matrix.target != 'jvm' }} || haxelib install hxjava
          ${{ matrix.target != 'cpp' }} || haxelib git hxcpp https://github.com/HaxeFoundation/hxcpp.git
          ${{ matrix.target != 'cpp' }} || haxe --cwd .haxelib/hxcpp/git/tools/hxcpp compile.hxml
          ${{ matrix.target != 'cpp' }} || haxelib git hxcpp_luv_io https://github.com/Aidan63/hxcpp_luv_io
          haxelib git utest https://github.com/haxe-utest/utest.git
          haxelib dev hxcoro .
          haxelib list
          haxe -version
          neko -version

      - name: Run tests
        run: |
          ${{ matrix.target == 'cpp' }} || haxe --cwd tests -debug build-${{ matrix.target }}.hxml
          haxe --cwd tests build-${{ matrix.target }}.hxml --hxb bin/test.hxb
          ${{ matrix.target == 'cpp' }} || haxe --cwd tests build-${{ matrix.target }}.hxml --hxb-lib bin/test.hxb

      - name: Run callstack tests
        if: matrix.target != 'cpp'
        run: haxe --cwd callstack-tests build-${{ matrix.target }}.hxml
