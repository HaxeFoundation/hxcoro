name: CI
on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        target: [eval, js, hl, cpp, jvm, php, python, neko]
        dispatcher: ['', trampoline]
        exclude:
          # php is not available by default for macos runners, probably not worth bothering
          - os: macos-latest
            target: php
          # These targets already use trampoline as their default dispatcher
          - target: js
            dispatcher: trampoline
          - target: php
            dispatcher: trampoline
          - target: python
            dispatcher: trampoline
          - target: neko
            dispatcher: trampoline
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: kLabz/setup-haxe@neko-latest
        with:
          haxe-version: "latest"

      - name: Setup hashlink
        if: matrix.target == 'hl'
        uses: HaxeFoundation/setup-hashlink@v1
        with:
          version: nightly

      - name: Check hashlink
        if: matrix.target == 'hl'
        run: hl --version

      - name: Setup haxelib
        run: |
          haxelib newrepo
          ${{ matrix.target != 'jvm' }} || haxelib install hxjava
          ${{ matrix.target != 'cpp' }} || haxelib git hxcpp https://github.com/HaxeFoundation/hxcpp.git
          ${{ matrix.target != 'cpp' }} || haxe --cwd .haxelib/hxcpp/git/tools/hxcpp compile.hxml
          ${{ matrix.target != 'cpp' }} || haxelib git hxcpp_luv_io https://github.com/Aidan63/hxcpp_luv_io
          haxelib git utest https://github.com/haxe-utest/utest.git
          haxelib dev hxcoro .
          haxelib list
          haxe -version
          neko -version

      - name: Run tests
        env:
          DISPATCHER_FLAG: ${{ matrix.dispatcher != '' && format('-D dispatcher={0}', matrix.dispatcher) || '' }}
        shell: bash
        run: |
          ${{ matrix.target == 'cpp' }} || haxe --cwd tests -debug build-${{ matrix.target }}.hxml $DISPATCHER_FLAG
          haxe --cwd tests build-${{ matrix.target }}.hxml $DISPATCHER_FLAG --hxb bin/test.hxb
          ${{ matrix.target == 'cpp' }} || haxe --cwd tests build-${{ matrix.target }}.hxml $DISPATCHER_FLAG --hxb-lib bin/test.hxb

      - name: Run callstack tests
        run: haxe --cwd callstack-tests build-${{ matrix.target }}.hxml
